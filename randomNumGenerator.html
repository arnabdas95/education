<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Fun Generator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
}

.screen{
    width:100%;
    height:100vh;
}

#menu{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:20px;
    background:linear-gradient(135deg,#ff6b6b,#4ecdc4);
}

.menu-btn{
    width:85%;
    max-width:350px;
    padding:18px;
    border:none;
    border-radius:20px;
    font-size:1.3rem;
    font-weight:bold;
    background:white;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

#game{
    display:none;
    position:relative;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

#result{
    font-size:8rem;
    font-weight:bold;
    color:white;
    text-shadow:0 0 20px rgba(0,0,0,0.3);
    text-align:center;
    user-select:none;
}

#backBtn{
    position:absolute;
    top:20px;
    left:20px;
    border:none;
    padding:12px 18px;
    border-radius:15px;
    background:white;
    font-size:1rem;
    font-weight:bold;
    cursor:pointer;
    z-index:10;
}

#hint{
    position:absolute;
    bottom:30px;
    color:white;
    font-size:1rem;
}

#coinContainer{
    display:none;
    animation:flip 0.8s ease;
}

.coin{
    width:250px;
    height:250px;
    border-radius:50%;
    background:radial-gradient(circle at 30% 30%,
            #fff6b7,
            #f7d24f,
            #c8961e);
    border:8px solid #f4e28a;
    box-shadow:
        0 0 25px rgba(0,0,0,.3),
        inset 0 0 20px rgba(255,255,255,.5);
    display:flex;
    justify-content:center;
    align-items:center;
    color:#5a3c00;
}

.coinText{
    text-align:center;
    font-weight:bold;
}

.coinText .big{
    font-size:5rem;
}

.coinText .small{
    font-size:1.3rem;
}

@keyframes flip{
    from{
        transform:rotateY(0deg);
    }
    to{
        transform:rotateY(720deg);
    }
}
</style>
</head>
<body>

<!-- MENU -->

<div id="menu" class="screen">

    <button class="menu-btn" onclick="startGame('number')">
        🔢 Random Number
    </button>

    <button class="menu-btn" onclick="startGame('dice')">
        🎲 Dice Roll
    </button>

    <button class="menu-btn" onclick="startGame('coin')">
        🪙 Coin Toss
    </button>

    <button class="menu-btn" onclick="startGame('letter')">
        🔤 Letter Generator
    </button>

</div>

<!-- GAME SCREEN -->

<div id="game" class="screen">

    <button id="backBtn" onclick="goBack()">
        ⬅ Back
    </button>

    <div id="result"></div>

    <div id="coinContainer"></div>

    <div id="hint">
        Tap Anywhere To Generate Again
    </div>

</div>

<script>

let currentMode = "";

const gradients = [
["#ff6b6b","#feca57"],
["#6c5ce7","#00cec9"],
["#00b894","#55efc4"],
["#fd79a8","#e84393"],
["#0984e3","#74b9ff"],
["#e17055","#fab1a0"],
["#8e44ad","#3498db"],
["#f39c12","#f1c40f"],
["#2ecc71","#1abc9c"]
];

function randomBackground(){

    let g =
    gradients[Math.floor(Math.random()*gradients.length)];

    document.getElementById("game").style.background =
    `linear-gradient(135deg,${g[0]},${g[1]})`;
}

function startGame(mode){

    currentMode = mode;

    document.getElementById("menu").style.display = "none";
    document.getElementById("game").style.display = "flex";

    generate();
}

function goBack(){

    document.getElementById("game").style.display = "none";
    document.getElementById("menu").style.display = "flex";
}

function showCoin(){

    const coinContainer =
    document.getElementById("coinContainer");

    const heads = Math.random() < 0.5;

    if(heads){

        coinContainer.innerHTML = `
            <div class="coin">
                <div class="coinText">
                    <div class="big">₹</div>
                    <div class="small">HEADS</div>
                </div>
            </div>
        `;
    }
    else{

        coinContainer.innerHTML = `
            <div class="coin">
                <div class="coinText">
                    <div class="big">🦁</div>
                    <div class="small">TAILS</div>
                </div>
            </div>
        `;
    }

    coinContainer.style.display = "block";

    coinContainer.style.animation = "none";
    void coinContainer.offsetWidth;
    coinContainer.style.animation = "flip 0.8s ease";
}

function generate(){

    randomBackground();

    const result =
    document.getElementById("result");

    const coinContainer =
    document.getElementById("coinContainer");

    result.style.display = "block";
    coinContainer.style.display = "none";

    switch(currentMode){

        case "number":

            result.style.fontSize = "9rem";
            result.innerHTML =
            Math.floor(Math.random()*100)+1;
            break;

        case "dice":

            result.style.fontSize = "10rem";

            const dice =
            ["⚀","⚁","⚂","⚃","⚄","⚅"];

            result.innerHTML =
            dice[Math.floor(Math.random()*6)];
            break;

        case "letter":

            result.style.fontSize = "10rem";

            const letters =
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

            result.innerHTML =
            letters[Math.floor(Math.random()*26)];
            break;

        case "coin":

            result.style.display = "none";
            showCoin();
            break;
    }
}

document.getElementById("game")
.addEventListener("click", function(e){

    if(e.target.id === "backBtn")
        return;

    generate();
});

</script>

</body>
</html>
