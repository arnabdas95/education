<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Random Fun">
<title>Random Fun Generator</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{height:100vh;overflow:hidden;}
.screen{width:100%;height:100vh;}

#menu,#numberSettings{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
background:linear-gradient(135deg,#ff6b6b,#4ecdc4);
}

.menu-btn{
width:85%;
max-width:350px;
padding:18px;
border:none;
border-radius:20px;
font-size:1.3rem;
font-weight:bold;
background:white;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

#numberSettings{display:none;}

.settings-card{
width:85%;
max-width:350px;
padding:30px;
border-radius:25px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
display:flex;
flex-direction:column;
gap:15px;
}

.settings-card h2{color:white;text-align:center;}
.settings-card input{
padding:15px;
border:none;
border-radius:15px;
font-size:1.1rem;
text-align:center;
}

#game{
display:none;
position:relative;
justify-content:center;
align-items:center;
flex-direction:column;
}

#result{
font-size:8rem;
font-weight:bold;
color:white;
text-shadow:0 0 20px rgba(0,0,0,.3);
text-align:center;
user-select:none;
}

#backBtn{
position:absolute;
top:18px;
right:18px;
width:36px;
height:36px;
border:none;
border-radius:50%;
background:rgba(255,255,255,.15);
backdrop-filter:blur(5px);
color:white;
font-size:1rem;
display:flex;
align-items:center;
justify-content:center;
z-index:10;
}

#hint{
position:absolute;
bottom:60px;
color:white;
font-size:1rem;
}

#credit{
position:absolute;
bottom:20px;
color:white;
font-size:.9rem;
opacity:.8;
}

#coinContainer{display:none;}

.coin{
width:250px;
height:250px;
border-radius:50%;
background:radial-gradient(circle at 30% 30%,#fff6b7,#f7d24f,#c8961e);
border:8px solid #f4e28a;
box-shadow:0 0 25px rgba(0,0,0,.3), inset 0 0 20px rgba(255,255,255,.5);
display:flex;
justify-content:center;
align-items:center;
color:#5a3c00;
animation:flip .8s ease;
}

.coinText{text-align:center;font-weight:bold;}
.coinText .big{font-size:5rem;}
.coinText .small{font-size:1.3rem;}

@keyframes flip{
from{transform:rotateY(0deg);}
to{transform:rotateY(720deg);}
}
</style>
</head>
<body>

<div id="menu" class="screen">
<button class="menu-btn" onclick="showNumberSettings()">🔢 Random Number</button>
<button class="menu-btn" onclick="startGame('dice')">🎲 Dice Roll</button>
<button class="menu-btn" onclick="startGame('coin')">🪙 Coin Toss</button>
<button class="menu-btn" onclick="startGame('letter')">🔤 Letter Generator</button>
</div>

<div id="numberSettings" class="screen">
<div class="settings-card">
<h2>Random Number Range</h2>
<input id="minNumber" type="number" value="1" placeholder="Minimum">
<input id="maxNumber" type="number" value="100" placeholder="Maximum">
<button class="menu-btn" onclick="startNumberGame()">Start</button>
</div>
</div>

<div id="game" class="screen">
<button id="backBtn" onclick="goBack()">✕</button>
<div id="result"></div>
<div id="coinContainer"></div>
<div id="hint">Tap on Screen</div>
<div id="credit">Developed by Arnab</div>
</div>

<script>
let currentMode="";
let minNumber=1;
let maxNumber=100;

const gradients=[
["#ff6b6b","#feca57"],
["#6c5ce7","#00cec9"],
["#00b894","#55efc4"],
["#fd79a8","#e84393"],
["#0984e3","#74b9ff"],
["#e17055","#fab1a0"],
["#8e44ad","#3498db"],
["#f39c12","#f1c40f"],
["#2ecc71","#1abc9c"]
];

function showNumberSettings(){
document.getElementById("menu").style.display="none";
document.getElementById("numberSettings").style.display="flex";
}

function startNumberGame(){
minNumber=parseInt(document.getElementById("minNumber").value);
maxNumber=parseInt(document.getElementById("maxNumber").value);

if(isNaN(minNumber)||isNaN(maxNumber)){
alert("Enter valid numbers");
return;
}
if(minNumber>=maxNumber){
alert("Maximum must be greater than minimum");
return;
}

document.getElementById("numberSettings").style.display="none";
startGame("number");
}

function randomBackground(){
let g=gradients[Math.floor(Math.random()*gradients.length)];
document.getElementById("game").style.background=`linear-gradient(135deg,${g[0]},${g[1]})`;
}

function startGame(mode){
currentMode=mode;
document.getElementById("menu").style.display="none";
document.getElementById("game").style.display="flex";
generate();
}

function goBack(){
document.getElementById("game").style.display="none";
document.getElementById("numberSettings").style.display="none";
document.getElementById("menu").style.display="flex";
}

function showCoin(){
const coinContainer=document.getElementById("coinContainer");
const heads=Math.random()<0.5;

coinContainer.innerHTML=heads?
`<div class="coin"><div class="coinText"><div class="big">₹</div><div class="small">HEADS</div></div></div>`:
`<div class="coin"><div class="coinText"><div class="big">🦁</div><div class="small">TAILS</div></div></div>`;

coinContainer.style.display="block";
}

function generate(){
randomBackground();

const result=document.getElementById("result");
const coinContainer=document.getElementById("coinContainer");

result.style.display="block";
coinContainer.style.display="none";

switch(currentMode){

case "number":
result.style.fontSize="9rem";
result.innerHTML=Math.floor(Math.random()*(maxNumber-minNumber+1))+minNumber;
break;

case "dice":
result.style.fontSize="10rem";
const dice=["⚀","⚁","⚂","⚃","⚄","⚅"];
result.innerHTML=dice[Math.floor(Math.random()*6)];
break;

case "letter":
result.style.fontSize="10rem";
const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
result.innerHTML=letters[Math.floor(Math.random()*26)];
break;

case "coin":
result.style.display="none";
showCoin();
break;
}
}

document.getElementById("game").addEventListener("click",function(e){
if(e.target.id==="backBtn") return;
generate();
});

document.getElementById("game").addEventListener("touchstart",function(e){
if(e.target.id==="backBtn") return;
e.preventDefault();
generate();
},{passive:false});
</script>

</body>
</html>
